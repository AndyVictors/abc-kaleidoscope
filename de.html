<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; }
    a { color: #5b8fc7; text-decoration: none; }
    a:hover { color: #3d6ea3; text-decoration: underline; }
  </style>
</helmet>
<div style="min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-sizing: border-box; background: {{ bgGradient }}; font-family: 'Quicksand', sans-serif; overflow-x: hidden;">

  <div style="flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px 24px; text-align: center; gap: 8px;">

    <img src="./assets/deti_help.png" alt="Illustration of two children reading together on a tablet" style="width: min(340px, 60vw); height: auto; display: block; margin-bottom: 8px;" />

    <h1 style="margin: 0; font-family: 'Fredoka', 'Comic Sans MS', sans-serif; font-weight: 600; font-size: clamp(40px, 8vw, 68px); line-height: 1; background: linear-gradient(90deg, #f6a44c, #e8788f, #6fa6d6); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 0.5px;">
      ABC Kaleidoscope
    </h1>

    <sc-if value="{{ showTagline }}" hint-placeholder-val="{{ true }}">
      <p style="margin: 4px 0 0; font-size: clamp(16px, 2.4vw, 20px); color: #5c6b73; font-weight: 500; letter-spacing: 0.3px;">
        Interaktive Kinderbücher
      </p>
    </sc-if>

  </div>

  <footer style="width: 100%; box-sizing: border-box; padding: 24px 24px 32px; display: flex; flex-direction: column; align-items: center; gap: 14px;">
    <nav style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 24px; font-size: 14px; color: #5c6b73;">
      <a href="imprint.html">Impressum</a>
      <a href="privacy.html">Datenschutz</a>
    </nav>
    <nav style="display: flex; gap: 18px; font-size: 12px;">
      <a href="index.html" style="color: #8fae86; font-weight: 600;" style-hover="color: #7a9c70;">EN</a>
      <a href="de.html" style="color: #c3d2be;" style-hover="color: #a9bda2;">DE</a>
    </nav>
  </footer>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 900}, &quot;bgTone&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;sky&quot;, &quot;options&quot;: [&quot;sky&quot;, &quot;warm&quot;, &quot;pastel&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Style&quot;}, &quot;showTagline&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Content&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const tone = this.props.bgTone ?? 'sky';
    const gradients = {
      sky: 'linear-gradient(180deg, #d9edfb 0%, #f3f9f2 55%, #e3f5e0 100%)',
      warm: 'linear-gradient(180deg, #fdf2e3 0%, #f9f2ec 55%, #e8f4ea 100%)',
      pastel: 'linear-gradient(180deg, #eae6f7 0%, #f6ecf1 45%, #e3f5e0 100%)'
    };
    return {
      bgGradient: gradients[tone] || gradients.sky,
      showTagline: this.props.showTagline ?? true
    };
  }
}
</script>
</body>
</html>
